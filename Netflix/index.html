<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Seleção de Perfil</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <header>
        <div class="theme-toggle-wrapper">
            <button id="theme-toggle" aria-label="Alternar tema">🌙</button>
        </div>
    </header>

    <main>
        <section aria-labelledby="perfil-title">
            <h2 id="perfil-title">Quem está assistindo?</h2>
            <div class="profiles" role="list">
                <article class="profile" role="listitem">
                    <a href="catalogo/catalogo.html" class="perfil">
                        <figure>
                            <img src="assets/perfil-1.jpg" alt="Avatar do Perfil 1">
                            <figcaption>Kevin</figcaption>
                        </figure>
                    </a>
                </article>

                <article class="profile" role="listitem">
                    <a href="catalogo/catalogo.html" class="perfil">
                        <figure>
                            <img src="assets/perfil-2.jpg" alt="Avatar do Perfil 2">
                            <figcaption>Isadora</figcaption>
                        </figure>
                    </a>
                </article>
                 <article class="profile" role="listitem">
                    <a href="catalogo/catalogo.html" class="perfil">
                        <figure>
                            <img src="assets/perfil-3.jpg" alt="Avatar do Perfil 3">
                            <figcaption>Pedro</figcaption>
                        </figure>
                    </a>
                </article>
                 <article class="profile" role="listitem">
                    <a href="catalogo/catalogo.html" class="perfil">
                        <figure>
                            <img src="assets/perfil-4.jpg" alt="Avatar do Perfil 4">
                            <figcaption>Gaby</figcaption>
                        </figure>
                    </a>
                </article>
            </div>
        </section>
    </main>


    <footer>
        <p>Alterne entre os temas usando o botão acima.</p>
    </footer>
    <script src="js/index.js"></script>
    <script src="modos.js"></script>
</body>
</html>
